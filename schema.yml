components:
  schemas:
    Appointment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        patient:
          type: integer
        doctor:
          type: integer
        scheduled_at:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/StatusEnum'
        reason:
          type: string
        notes:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        doctor_details:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        patient_details:
          allOf:
          - $ref: '#/components/schemas/Patient'
          readOnly: true
      required:
      - created_at
      - doctor
      - doctor_details
      - id
      - patient
      - patient_details
      - scheduled_at
      - updated_at
    MedicalRecord:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        appointment:
          type: integer
        diagnosis:
          type: string
        treatment_plan:
          type: string
        prescriptions:
          type: string
        follow_up_instructions:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        appointment_details:
          allOf:
          - $ref: '#/components/schemas/Appointment'
          readOnly: true
      required:
      - appointment
      - appointment_details
      - created_at
      - diagnosis
      - id
      - updated_at
    PaginatedAppointmentList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Appointment'
    PaginatedMedicalRecordList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/MedicalRecord'
    PaginatedPatientList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Patient'
    PaginatedUserList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/User'
    PatchedAppointment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        patient:
          type: integer
        doctor:
          type: integer
        scheduled_at:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/StatusEnum'
        reason:
          type: string
        notes:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        doctor_details:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        patient_details:
          allOf:
          - $ref: '#/components/schemas/Patient'
          readOnly: true
    PatchedMedicalRecord:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        appointment:
          type: integer
        diagnosis:
          type: string
        treatment_plan:
          type: string
        prescriptions:
          type: string
        follow_up_instructions:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        appointment_details:
          allOf:
          - $ref: '#/components/schemas/Appointment'
          readOnly: true
    PatchedPatient:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        matric_number:
          type: string
          maxLength: 50
        date_of_birth:
          type: string
          format: date
        phone_number:
          type: string
          maxLength: 20
        email:
          type: string
          format: email
          maxLength: 254
        address:
          type: string
        emergency_contact_name:
          type: string
          maxLength: 255
        emergency_contact_phone:
          type: string
          maxLength: 20
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    PatchedUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
        role:
          $ref: '#/components/schemas/RoleEnum'
        password:
          type: string
          writeOnly: true
          maxLength: 128
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        date_joined:
          type: string
          format: date-time
          readOnly: true
    Patient:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        matric_number:
          type: string
          maxLength: 50
        date_of_birth:
          type: string
          format: date
        phone_number:
          type: string
          maxLength: 20
        email:
          type: string
          format: email
          maxLength: 254
        address:
          type: string
        emergency_contact_name:
          type: string
          maxLength: 255
        emergency_contact_phone:
          type: string
          maxLength: 20
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - date_of_birth
      - first_name
      - id
      - last_name
      - matric_number
      - phone_number
      - updated_at
    RoleEnum:
      enum:
      - ADMIN
      - DOCTOR
      - RECEPTIONIST
      type: string
      description: |-
        * `ADMIN` - Admin
        * `DOCTOR` - Doctor
        * `RECEPTIONIST` - Receptionist
    StatusEnum:
      enum:
      - SCHEDULED
      - COMPLETED
      - CANCELLED
      type: string
      description: |-
        * `SCHEDULED` - Scheduled
        * `COMPLETED` - Completed
        * `CANCELLED` - Cancelled
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
        role:
          $ref: '#/components/schemas/RoleEnum'
        password:
          type: string
          writeOnly: true
          maxLength: 128
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        date_joined:
          type: string
          format: date-time
          readOnly: true
      required:
      - date_joined
      - email
      - id
      - username
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
